services:
  leword-api:
    image: ${LEWORD_MOBILE_API_IMAGE:-ghcr.io/cd000242-sudo/leword-mobile-api:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LEWORD_API_BIND_PORT:-34983}:34983"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      LEWORD_API_PORT: "34983"
      LEWORD_CHROME_PATH: /usr/bin/chromium
      LEWORD_MOBILE_CACHE_FILE: /data/mobile-cache.json
      LEWORD_MOBILE_KEYWORD_CACHE_FILE: /data/keyword-cache.json
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_FILE: /data/live-golden-board.json
      LEWORD_MOBILE_LIVE_GOLDEN_ENABLED: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_ON_START: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_IGNORE_PREWARM: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_INTERVAL_MINUTES: ${LEWORD_MOBILE_LIVE_GOLDEN_INTERVAL_MINUTES:-60}
      LEWORD_MOBILE_LIVE_GOLDEN_LIMIT: ${LEWORD_MOBILE_LIVE_GOLDEN_LIMIT:-15}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS:-1000}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES:-3600}
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET: ${LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET:-120}
      LEWORD_MOBILE_PREWARM_INTERVAL_MINUTES: ${LEWORD_MOBILE_PREWARM_INTERVAL_MINUTES:-60}
      LEWORD_MOBILE_PREWARM_LIMIT: ${LEWORD_MOBILE_PREWARM_LIMIT:-8}
      LEWORD_MOBILE_PREWARM_ON_START: ${LEWORD_MOBILE_PREWARM_ON_START:-true}
      LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT: ${LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT:-5}
    volumes:
      - leword-mobile-cache:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const port=process.env.LEWORD_API_PORT||34983; fetch('http://127.0.0.1:'+port+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  leword-mobile-cache:
