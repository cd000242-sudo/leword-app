services:
  leword-volume-init:
    image: ${LEWORD_MOBILE_API_IMAGE:?LEWORD_MOBILE_API_IMAGE must be an immutable digest-pinned GHCR image}
    user: "0:0"
    restart: "no"
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    entrypoint: ["node"]
    command: ["/app/apps/api/scripts/initialize-production-volumes.js"]
    environment:
      LEWORD_VOLUME_INIT_MODE: forward
    volumes:
      - leword-mobile-cache:/data
      - leword-live-golden-data:/golden
      - leword-review-artifacts:/review
      - leword-home-keyword-briefing:/briefing
      - leword-searchad-accounts:/searchad
      - leword-measurement-quota:/quota

  leword-api:
    image: ${LEWORD_MOBILE_API_IMAGE:?LEWORD_MOBILE_API_IMAGE must be an immutable digest-pinned GHCR image}
    restart: unless-stopped
    depends_on:
      leword-volume-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${LEWORD_API_BIND_PORT:-34983}:34983"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      LEWORD_API_PORT: "34983"
      LEWORD_CHROME_PATH: /usr/bin/chromium
      LEWORD_MOBILE_CACHE_FILE: /data/mobile-cache.json
      LEWORD_MOBILE_KEYWORD_CACHE_FILE: /data/keyword-cache.json
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_FILE: /golden/live-golden-board.json
      LEWORD_MOBILE_LIVE_GOLDEN_HEARTBEAT_FILE: /golden/live-golden-worker-heartbeat.json
      LEWORD_MOBILE_LIVE_GOLDEN_HUMAN_REVIEW_FILE: /review/live-golden-human-review.json
      LEWORD_MOBILE_LIVE_GOLDEN_REVIEW_COHORT_FILE: /review/live-golden-review-cohort.json
      LEWORD_MOBILE_PHASE2_ENTRY_CERTIFICATE_FILE: /review/live-golden-phase2-entry-certificate.json
      LEWORD_MOBILE_HOME_KEYWORD_BRIEFING_FILE: /briefing/home-keyword-briefing.json
      LEWORD_MOBILE_LIVE_GOLDEN_ENABLED: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_READONLY: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_ON_START: "false"
      LEWORD_MOBILE_LIVE_GOLDEN_IGNORE_PREWARM: ${LEWORD_MOBILE_LIVE_GOLDEN_IGNORE_PREWARM:-true}
      LEWORD_MOBILE_LIVE_GOLDEN_INTERVAL_MINUTES: ${LEWORD_MOBILE_LIVE_GOLDEN_API_INTERVAL_MINUTES:-1440}
      LEWORD_MOBILE_LIVE_GOLDEN_LIMIT: ${LEWORD_MOBILE_LIVE_GOLDEN_LIMIT:-15}
      LEWORD_MOBILE_LIVE_GOLDEN_START_DELAY_MS: ${LEWORD_MOBILE_LIVE_GOLDEN_START_DELAY_MS:-300000}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS:-1000}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES:-3600}
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET: ${LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET:-240}
      LEWORD_MOBILE_PREWARM_INTERVAL_MINUTES: ${LEWORD_MOBILE_PREWARM_INTERVAL_MINUTES:-360}
      LEWORD_MOBILE_PREWARM_LIMIT: ${LEWORD_MOBILE_PREWARM_LIMIT:-2}
      LEWORD_MOBILE_PREWARM_CONCURRENCY: ${LEWORD_MOBILE_PREWARM_CONCURRENCY:-1}
      LEWORD_MOBILE_PREWARM_SEARCHAD_SOFT_CEILING: ${LEWORD_MOBILE_PREWARM_SEARCHAD_SOFT_CEILING:-1500}
      LEWORD_MOBILE_PREWARM_ON_START: ${LEWORD_MOBILE_PREWARM_ON_START:-false}
      LEWORD_MOBILE_PREWARM_START_DELAY_MS: ${LEWORD_MOBILE_PREWARM_START_DELAY_MS:-300000}
      LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT: ${LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT:-5}
      LEWORD_MOBILE_MAX_CONCURRENT_JOBS: ${LEWORD_MOBILE_MAX_CONCURRENT_JOBS:-1}
      LEWORD_SEARCHAD_SOFT_CEILING: ${LEWORD_SEARCHAD_WORKER_SOFT_CEILING:-22000}
      LEWORD_SEARCHAD_ACCOUNTS_FILE: /searchad/searchad-accounts.json
      LEWORD_SEARCHAD_QUOTA_STATE_FILE: /quota/searchad-quota-state.json
      LEWORD_NAVER_OPENAPI_QUOTA_STATE_FILE: /quota/naver-openapi-quota-state.json
      # Manus 검색-이유 추론용(브리핑 발행은 이 API 컨테이너에서 일어난다).
      # 키/크레딧이 없으면 조용히 사전 폴백. .env.production 에 MANUS_API_KEY 를
      # 넣고 충전하면 다음 발행부터 자동으로 추론이 붙는다.
      MANUS_API_KEY: ${MANUS_API_KEY:-}
      LEWORD_BROWSER_POOL_MAX_SIZE: ${LEWORD_BROWSER_POOL_MAX_SIZE:-1}
      LEWORD_BROWSER_POOL_IDLE_MS: ${LEWORD_BROWSER_POOL_IDLE_MS:-5000}
      LEWORD_BROWSER_POOL_MAX_LEASE_MS: ${LEWORD_BROWSER_POOL_MAX_LEASE_MS:-600000}
    volumes:
      - leword-mobile-cache:/data
      - leword-live-golden-data:/golden:ro
      - leword-review-artifacts:/review
      - leword-home-keyword-briefing:/briefing
      - leword-searchad-accounts:/searchad:ro
      - leword-measurement-quota:/quota
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:34983/health
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  leword-live-golden-worker:
    image: ${LEWORD_MOBILE_API_IMAGE:?LEWORD_MOBILE_API_IMAGE must be an immutable digest-pinned GHCR image}
    restart: unless-stopped
    depends_on:
      leword-volume-init:
        condition: service_completed_successfully
    command: ["npm", "--prefix", "apps/api", "run", "worker:live-golden"]
    healthcheck:
      test:
        - CMD-SHELL
        - "test -s /golden/live-golden-worker-heartbeat.json && find /golden/live-golden-worker-heartbeat.json -mmin -3 -print -quit | grep -q ."
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
    env_file:
      - .env.live-golden-worker.production
    environment:
      NODE_ENV: production
      LEWORD_CHROME_PATH: /usr/bin/chromium
      LEWORD_MOBILE_CACHE_FILE: /golden/mobile-cache.json
      LEWORD_MOBILE_KEYWORD_CACHE_FILE: /golden/keyword-cache.json
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_FILE: /golden/live-golden-board.json
      LEWORD_MOBILE_LIVE_GOLDEN_HEARTBEAT_FILE: /golden/live-golden-worker-heartbeat.json
      LEWORD_MOBILE_LIVE_GOLDEN_REVIEW_COHORT_FILE: /review/live-golden-review-cohort.json
      LEWORD_MOBILE_HOME_KEYWORD_BRIEFING_FILE: /briefing/home-keyword-briefing.json
      LEWORD_MOBILE_LIVE_GOLDEN_ENABLED: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_ON_START: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_IGNORE_PREWARM: "true"
      LEWORD_MOBILE_LIVE_GOLDEN_INTERVAL_MINUTES: ${LEWORD_MOBILE_LIVE_GOLDEN_WORKER_INTERVAL_MINUTES:-12}
      LEWORD_MOBILE_LIVE_GOLDEN_LIMIT: ${LEWORD_MOBILE_LIVE_GOLDEN_LIMIT:-15}
      LEWORD_MOBILE_LIVE_GOLDEN_START_DELAY_MS: ${LEWORD_MOBILE_LIVE_GOLDEN_START_DELAY_MS:-15000}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_SEEDS:-1000}
      LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES: ${LEWORD_MOBILE_LIVE_GOLDEN_MAX_CANDIDATES:-3600}
      LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET: ${LEWORD_MOBILE_LIVE_GOLDEN_BOARD_TARGET:-240}
      LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT: ${LEWORD_PUBLIC_GOLDEN_PREVIEW_COUNT:-5}
      LEWORD_SEARCHAD_SOFT_CEILING: ${LEWORD_SEARCHAD_WORKER_SOFT_CEILING:-22000}
      LEWORD_SEARCHAD_ACCOUNTS_FILE: /searchad/searchad-accounts.json
      LEWORD_SEARCHAD_QUOTA_STATE_FILE: /quota/searchad-quota-state.json
      LEWORD_NAVER_OPENAPI_QUOTA_STATE_FILE: /quota/naver-openapi-quota-state.json
      LEWORD_BROWSER_POOL_MAX_SIZE: ${LEWORD_BROWSER_POOL_MAX_SIZE:-1}
      LEWORD_BROWSER_POOL_IDLE_MS: ${LEWORD_BROWSER_POOL_IDLE_MS:-5000}
      LEWORD_BROWSER_POOL_MAX_LEASE_MS: ${LEWORD_BROWSER_POOL_MAX_LEASE_MS:-600000}
    volumes:
      - leword-live-golden-data:/golden
      - leword-review-artifacts:/review:ro
      - leword-home-keyword-briefing:/briefing:ro
      - leword-searchad-accounts:/searchad:ro
      - leword-measurement-quota:/quota

volumes:
  leword-mobile-cache:
  leword-live-golden-data:
  leword-review-artifacts:
  leword-home-keyword-briefing:
  leword-searchad-accounts:
  leword-measurement-quota:
