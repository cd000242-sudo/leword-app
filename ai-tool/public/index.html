<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 황금 키워드 탐지기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
        }

        .markdown-body ul {
            list-style-type: disc;
            margin-left: 1.5em;
        }

        .markdown-body ol {
            list-style-type: decimal;
            margin-left: 1.5em;
        }

        .markdown-body p {
            margin-bottom: 0.5em;
        }

        .markdown-body strong {
            color: #03C75A;
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-anime {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col items-center justify-center overflow-hidden relative">

    <!-- 설정 모달 (초기 상태 hidden) -->
    <div id="settings-modal"
        class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 transform transition-all scale-100">
            <h2 class="text-xl font-bold mb-4 text-gray-800">⚙️ 설정</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Gemini API Key</label>
                <input type="password" id="api-key-input"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
                    placeholder="AI Studio에서 키를 발급받으세요">
                <p class="text-xs text-gray-500 mt-2">키는 브라우저에만 저장되며 서버로 안전하게 전송됩니다.</p>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">사용할 모델 (Model)</label>
                <select id="model-select" onchange="toggleCustomModel()"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition bg-white mb-2">
                    <option value="gemini-1.5-pro" selected>Gemini 1.5 Pro (추천, 똑똑함)</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash (매우 빠름)</option>
                    <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (최신 실험버전/Preview)</option>
                    <option value="custom">직접 입력...</option>
                </select>
                <input type="text" id="model-name-input"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition hidden"
                    placeholder="모델 ID 입력 (예: gemini-pro-vision)">
                <p class="text-xs text-gray-500">원하는 모델을 선택하세요.</p>
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="closeSettings()"
                    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">취소</button>
                <button onclick="saveSettings()"
                    class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition font-bold shadow-md">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <div
        class="w-full max-w-md h-full md:h-[90vh] bg-white md:rounded-3xl shadow-2xl flex flex-col overflow-hidden relative border border-gray-200">

        <!-- 헤더 -->
        <div class="bg-white border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center text-lg">🤖</div>
                <h1 class="font-bold text-lg text-gray-800">AI 황금 키워드 탐지기</h1>
            </div>
            <button onclick="openSettings()"
                class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <!-- 채팅 영역 -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
            <!-- 봇 초기 메시지 -->
            <div class="flex items-start space-x-2 message-anime">
                <div
                    class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
                    AI</div>
                <div
                    class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-gray-800 max-w-[85%] leading-relaxed">
                    안녕하세요! 👋<br>
                    어떤 주제의 <span class="text-green-600 font-bold">황금 키워드</span>를 찾아드릴까요?<br>
                    (예: "겨울 간식", "아이폰16 출시일")
                </div>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="p-4 bg-white border-t border-gray-100">
            <div
                class="relative flex items-center bg-gray-100 rounded-full px-4 py-2 focus-within:ring-2 focus-within:ring-green-500 transition shadow-inner">
                <input type="text" id="user-input"
                    class="flex-1 bg-transparent border-none outline-none text-sm py-2 text-gray-800 placeholder-gray-400"
                    placeholder="무엇이든 물어보세요..." onkeypress="if(event.keyCode==13) sendMessage()">
                <button onclick="sendMessage()"
                    class="ml-2 w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white hover:bg-green-600 transition shadow-md transform hover:scale-105">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <p class="text-xs text-center text-gray-400 mt-2">Gemini Pro API & Naver Real-time Data</p>
        </div>

    </div>

    <!-- 플로팅 버튼 (우측 하단) -->
    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="document.querySelector('#user-input').focus()"
            class="w-14 h-14 bg-green-500 rounded-full shadow-lg flex items-center justify-center text-white hover:bg-green-600 transition animate-bounce">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
        </button>
    </div>

    <script>
        // API 키 관리
        function checkApiKey() {
            const key = localStorage.getItem('chatApiKey');
            if (!key) {
                openSettings();
                return false;
            }
            return key;
        }

        // 모델 선택 로직
        function toggleCustomModel() {
            const select = document.getElementById('model-select');
            const input = document.getElementById('model-name-input');
            if (select.value === 'custom') {
                input.classList.remove('hidden');
                input.focus();
            } else {
                input.classList.add('hidden');
            }
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            const key = localStorage.getItem('chatApiKey');
            const model = localStorage.getItem('chatModelName') || 'gemini-1.5-pro';

            if (key) document.getElementById('api-key-input').value = key;

            // 모델 선택 UI 초기화
            const select = document.getElementById('model-select');
            const input = document.getElementById('model-name-input');

            // 저장된 모델이 옵션에 있는지 확인
            const optionExists = [...select.options].some(o => o.value === model);

            if (optionExists) {
                select.value = model;
                input.classList.add('hidden');
            } else {
                select.value = 'custom';
                input.value = model; // 사용자 지정 모델명 복원
                input.classList.remove('hidden');
            }
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            const select = document.getElementById('model-select');
            const input = document.getElementById('model-name-input');

            // 선택된 모델 결정 (custom이면 입력창 값, 아니면 드롭다운 값)
            let model = select.value === 'custom' ? input.value.trim() : select.value;
            if (!model) model = 'gemini-1.5-pro'; // 기본값

            if (key) {
                localStorage.setItem('chatApiKey', key);
                localStorage.setItem('chatModelName', model);
                closeSettings();
                addBotMessage(`설정이 저장되었습니다! (모델: ${model}) 🎉`);
            } else {
                alert("API 키를 입력해주세요!");
            }
        }

        // 메시지 전송 로직
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            const apiKey = checkApiKey();
            const modelName = localStorage.getItem('chatModelName') || 'gemini-1.5-pro';

            if (!message || !apiKey) return;

            // 유저 메시지 표시
            addUserMessage(message);
            input.value = '';

            // 로딩 표시
            const loadingId = addBotLoading();

            try {
                const response = await fetch('http://localhost:3000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        apiKey: apiKey,
                        modelName: modelName // 모델명 전송
                    })
                });
                const data = await response.json();

                // 로딩 제거 및 응답 표시
                removeLoading(loadingId);
                addBotMessage(data.reply);

            } catch (error) {
                removeLoading(loadingId);
                addBotMessage("서버 연결에 실패했습니다. (node server.js 확인 필요)");
            }
        }

        // UI 헬퍼 함수들
        function addUserMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "flex items-end justify-end space-x-2 message-anime";
            div.innerHTML = `
                <div class="bg-green-500 p-3 rounded-2xl rounded-tr-none shadow-md text-sm text-white max-w-[85%] leading-relaxed break-words">
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "flex items-start space-x-2 message-anime";

            // Markdown 파싱
            const htmlContent = marked.parse(text);

            div.innerHTML = `
                <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0">AI</div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-gray-800 max-w-[85%] leading-relaxed break-words markdown-body">
                    ${htmlContent}
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function addBotLoading() {
            const chatBox = document.getElementById('chat-box');
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex items-start space-x-2 message-anime";
            div.innerHTML = `
                <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0">AI</div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-sm text-gray-500">
                    <div class="flex space-x-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    </div>
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
