name: Build macOS Universal Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build universal DMG/ZIP
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi

      - name: Build and publish macOS universal release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK}" ]; then
            echo "::warning::MAC_CSC_LINK is not set. Building unsigned artifacts; Gatekeeper and customer auto-update may not work reliably."
            npm run release:mac:unsigned
          else
            npm run release:mac
          fi

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "macOS release artifacts"
          fi
          shopt -s nullglob
          assets=(release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No macOS assets found"
            exit 1
          fi
          gh release upload "${TAG}" "${assets[@]}" --clobber

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leword-mac-universal
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
