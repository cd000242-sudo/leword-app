name: Build LEWORD macOS Intel DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-x64-dmg:
    name: Build and upload x64 DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi

      - name: Build Intel DMG
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${CSC_LINK}" ]; then
            echo "::warning::MAC_CSC_LINK is not set. Building unsigned Intel DMG for manual distribution."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          fi
          npm run build
          npx electron-builder --mac dmg --x64 --publish never

      - name: Upload Intel DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "macOS Intel DMG"
          fi
          shopt -s nullglob
          assets=(release/LEWORD-${VERSION}-x64.dmg release/LEWORD-${VERSION}-x64.dmg.blockmap)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Intel DMG assets found"
            exit 1
          fi
          gh release upload "${TAG}" "${assets[@]}" --clobber

      - name: Upload Intel DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: leword-mac-x64-dmg
          if-no-files-found: error
          path: |
            release/LEWORD-*-x64.dmg
            release/LEWORD-*-x64.dmg.blockmap
